<p class="article-links">
  {% if a.pdf %}
  <a class="pill pill-pdf" href="{{ base }}articles/{{ a.urlPath }}/#preview">Read</a>
  <a class="pill pill-download" href="{{ a.pdf.downloadUrl }}">Download</a>
  {% endif %}
  {% if a.stats and a.stats.totalViews is not none %}
  <span class="pill pill-stat" title="{{ a.stats.viewsBreakdown }}">👁 {{ a.stats.totalViews }}</span>
  {% endif %}
  {% if a.stats and a.stats.pdfDownloads is not none %}
  <span class="pill pill-stat" title="PDF downloads">⬇ {{ a.stats.pdfDownloads }}</span>
  {% endif %}
</p>
