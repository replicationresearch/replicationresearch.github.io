name: Fetch content and deploy mirror

on:
  schedule:
    # Daily, off the hour (GitHub delays/drops on-the-hour cron jobs).
    # 04:23 UTC = 06:23 CEST / 05:23 CET.
    - cron: "23 4 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write   # commit refreshed data/ and assets/
  pages: write      # deploy to GitHub Pages
  id-token: write   # required by actions/deploy-pages
  issues: write     # open/close the "Mirror build failed" tracking issue
  actions: write    # delete a stale github-pages artifact on re-run (below)

concurrency:
  group: mirror-build
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch content from OJS
        env:
          OJS_API_KEY: ${{ secrets.OJS_API_KEY }}
          GOATCOUNTER_API_TOKEN: ${{ secrets.GOATCOUNTER_API_TOKEN }}
          BASE_URL: /${{ github.event.repository.name }}/
        run: python scripts/fetch.py

      - name: Commit refreshed content if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data assets
          if git diff --cached --quiet; then
            echo "No content changes."
          else
            git commit -m "chore: refresh mirrored content ($(date -u +%Y-%m-%d))"
            git pull --rebase --autostash origin main || true
            git push
          fi

      - name: Build static site
        env:
          BASE_URL: /${{ github.event.repository.name }}/
        run: python scripts/build.py

      - name: Enable GitHub Pages (first run)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Remove stale github-pages artifact from a previous attempt
        # Re-running this job (rather than triggering a brand-new run) leaves
        # the earlier attempt's "github-pages" artifact in place; the new
        # attempt then uploads a second one with the same name, and
        # deploy-pages fails with "Multiple artifacts named github-pages
        # were unexpectedly found". Only relevant on attempt 2+.
        if: github.run_attempt != '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | select(.name == "github-pages") | .id' |
          while read -r id; do
            echo "Deleting stale artifact $id"
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Fallback notification: GitHub already emails repo owners on a failed
      # run by default, but that setting can be off or filtered. This opens
      # (or comments on) a durable, visible issue instead, and auto-closes it
      # once a run succeeds again. Either way, a failure here never touches
      # the published site: fetch.py only writes data/ after its own sanity
      # checks pass, and a failed step stops the job before build/deploy run,
      # so the last successful build stays live untouched.
      - name: Open/update failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Mirror build failed";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `The scheduled mirror build failed on ${new Date().toISOString().slice(0, 10)}.\n\n` +
              `Run log: ${runUrl}\n\n` +
              "The published site was **not** changed by this run - it still shows the last successful build.";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: "open", per_page: 50,
            });
            const existing = issues.find(i => i.title === title && !i.pull_request);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo, title, body,
              });
            }

      - name: Close failure issue if this run succeeded
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Mirror build failed";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: "open", per_page: 50,
            });
            const existing = issues.find(i => i.title === title && !i.pull_request);
            if (existing) {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number,
                body: `The mirror build is passing again: ${runUrl}`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, state: "closed",
              });
            }
