name: Build Zenodo snapshot export

# Manual only - the site owner runs this whenever they want a new, citable
# snapshot to upload to Zenodo (or link via Zenodo's GitHub integration,
# which turns each GitHub Release into a new Zenodo version automatically).
on:
  workflow_dispatch: {}

permissions:
  contents: write   # create a GitHub Release

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with root-relative paths
        # assemble_snapshot.py (next step) expects this exact input: every
        # internal link starting with a single "/", so it can turn each one
        # into a same-document "#path" anchor.
        env:
          BASE_URL: /
        run: python scripts/build.py

      - name: Assemble into one self-contained HTML file
        run: python scripts/assemble_snapshot.py

      - name: Create GitHub Release with the snapshot attached
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mv _site/r2-mirror-snapshot.html "r2-mirror-snapshot-$DATE.html"
          gh release create "zenodo-export-${DATE}" \
            "r2-mirror-snapshot-${DATE}.html" \
            --title "Snapshot ${DATE}" \
            --notes "Single self-contained HTML file with the full text of the R2 mirror as of ${DATE} - open it directly (double-click, no server needed) for archiving on Zenodo. Every issue/article/announcement/page is a section labelled with its original site path (e.g. /articles/9577); link or cite a specific one via that path as a fragment, e.g. this file's name + #articles/9577."
